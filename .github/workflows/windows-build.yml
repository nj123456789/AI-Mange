name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests python-docx PyQt5

    - name: Build EXE with PyInstaller
      run: |
        cd "AI学情管理系统源文件"
        pyinstaller --onefile --windowed main.py --name "AI学情分析系统"

    - name: Install Inno Setup
      uses: ludeeus/innosetup@v1.1.0

    - name: Create Installer
      run: iscc.exe "AI学情管理系统源文件\setup.iss"

    - name: Upload Installer
      uses: actions/upload-artifact@v3
      with:
        name: AI学情管理系统安装包
        path: "AI学情管理系统源文件\\dist\\AI学情分析系统安装包.exe"
