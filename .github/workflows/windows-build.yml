name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests python-docx PyQt5

    - name: Build EXE with PyInstaller
      run: |
        cd "AI学情管理系统源文件"
        pyinstaller --onefile --windowed main.py --name "AI学情分析系统"

    - name: Install Inno Setup
      uses: ludeeus/innosetup@v1.1.0

    - name: Create Installer
      run: |
        $iss = @"
[Setup]
AppName=AI学情分析系统
AppVersion=1.0
DefaultDirName={pf}\AI学情分析系统
DefaultGroupName=AI学情分析系统
OutputDir=dist
OutputBaseFilename=AI学情分析系统安装包
Compression=lzma
SolidCompression=yes

[Files]
Source: "dist\AI学情分析系统.exe"; DestDir: "{app}"; Flags: ignoreversion
Source: "students.json"; DestDir: "{app}"; Flags: ignoreversion
Source: "users.json"; DestDir: "{app}"; Flags: ignoreversion

[Icons]
Name: "{group}\AI学情分析系统"; Filename: "{app}\AI学情分析系统.exe"
"@
        Set-Content -Path "setup.iss" -Value $iss -Encoding UTF8

        iscc.exe setup.iss

    - name: Upload Installer
      uses: actions/upload-artifact@v3
      with:
        name: AI学情管理系统安装包
        path: dist\AI学情分析系统安装包.exe
