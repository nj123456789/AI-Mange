name: Windows Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller requests python-docx PyQt5

    - name: Build EXE with PyInstaller
      run: |
        cd "AI学情管理系统源文件"
        pyinstaller --onefile --windowed main.py --name "AI学情分析系统"

    - name: Compile Installer with Inno Setup
      uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
      with:
        path: "AI学情管理系统源文件/setup.iss"
        options: /O+

    - name: Upload Installer
      uses: actions/upload-artifact@v4
      with:
        name: AI学情管理系统安装包
        path: "AI学情管理系统源文件/dist/AI学情分析系统安装包.exe"
