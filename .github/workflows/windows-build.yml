
name: Build Windows Installer

on:
  push:
    branches:
      - main

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ Install dependencies
      - name: Install dependencies
        run: |
          cd "AI学情管理系统源文件"
          python -m pip install --upgrade pip
          pip install pyqt5 requests python-docx pyinstaller

      # 4️⃣ Install Inno Setup
      - name: Install Inno Setup
        shell: powershell
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest $url -OutFile "C:\Windows\Temp\is.exe"
          Start-Process "C:\Windows\Temp\is.exe" -ArgumentList "/VERYSILENT /SP-" -Wait

      # 5️⃣ Build EXE with PyInstaller
      - name: Build EXE
        run: |
          cd "AI学情管理系统源文件"
          pyinstaller --onefile --windowed --add-data "students.json;." --add-data "users.json;." main.py

      # 6️⃣ Generate Inno Setup script (PowerShell-safe)
      - name: Generate Inno Setup script
        shell: powershell
        run: |
          cd "AI学情管理系统源文件"
          $setupContent = @'
[Setup]
AppName=AI学情分析系统
AppVersion=1.0
DefaultDirName={pf}\AIStudentSystem
DefaultGroupName=AIStudentSystem
OutputBaseFilename=AIStudentSystemInstaller
Compression=lzma
SolidCompression=yes

[Files]
Source: "dist\main.exe"; DestDir: "{app}"; Flags: ignoreversion
Source: "students.json"; DestDir: "{app}"; Flags: ignoreversion
Source: "users.json"; DestDir: "{app}"; Flags: ignoreversion
'@
          $setupContent | Out-File setup.iss -Encoding UTF8

      # 7️⃣ Build Installer
      - name: Build Installer
        run: |
          cd "AI学情管理系统源文件"
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      # 8️⃣ Upload artifacts
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIStudentSystem-Windows
          path: |
            AI学情管理系统源文件/dist/main.exe
            AI学情管理系统源文件/AIStudentSystemInstaller.exe
