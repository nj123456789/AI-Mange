name: Build Windows Installer

on:
  push:
    branches:
      - main

jobs:
  build-windows-installer:
    runs-on: windows-latest

    steps:
      # 1️⃣ 拉取代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ 安装 Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      # 3️⃣ 安装依赖和 PyInstaller
      - name: Install dependencies
        run: |
          cd "AI学情管理系统源文件"
          python -m pip install --upgrade pip
          pip install pyqt5 requests python-docx pyinstaller

      # 4️⃣ 安装 Inno Setup
      - name: Install Inno Setup
        shell: powershell
        run: |
          $url = "https://jrsoftware.org/download.php/is.exe"
          Invoke-WebRequest $url -OutFile "C:\Windows\Temp\is.exe"
          Start-Process "C:\Windows\Temp\is.exe" -ArgumentList "/VERYSILENT /SP-" -Wait

      # 5️⃣ 使用 PyInstaller 打包 EXE
      - name: Build EXE
        run: |
          cd "AI学情管理系统源文件"
          pyinstaller --onefile --windowed --add-data "students.json;." --add-data "users.json;." main.py

      # 6️⃣ 生成 Inno Setup 脚本（修正版，PowerShell 安全生成）
      - name: Generate Inno Setup script
        shell: powershell
        run: |
          cd "AI学情管理系统源文件"
          @'
[Setup]
AppName=AI学情分析系统
AppVersion=1.0
DefaultDirName={pf}\AIStudentSystem
DefaultGroupName=AIStudentSystem
OutputBaseFilename=AIStudentSystemInstaller
Compression=lzma
SolidCompression=yes

[Files]
Source: "dist\main.exe"; DestDir: "{app}"; Flags: ignoreversion
Source: "students.json"; DestDir: "{app}"; Flags: ignoreversion
Source: "users.json"; DestDir: "{app}"; Flags: ignoreversion
'@ | Out-File setup.iss -Encoding UTF8

      # 7️⃣ 使用 Inno Setup 打包安装程序
      - name: Build Installer
        run: |
          cd "AI学情管理系统源文件"
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      # 8️⃣ 上传 EXE 和安装包
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AIStudentSystem-Windows
          path: |
            AI学情管理系统源文件/dist/main.exe
            AI学情管理系统源文件/AIStudentSystemInstaller.exe
